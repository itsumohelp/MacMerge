name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write  # Release作成に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build universal DMG
        run: npm run build

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: MacMerge v${{ steps.pkg.outputs.version }}
          body: |
            ## MacMerge v${{ steps.pkg.outputs.version }}

            ### インストール方法
            1. `MacMerge-${{ steps.pkg.outputs.version }}-universal.dmg` をダウンロード
            2. DMGをマウントして `MacMerge.app` を `/Applications` へドラッグ
            3. 初回起動時は **右クリック → 「開く」** で起動（未署名のため）

            ### 動作環境
            - macOS 12 Monterey 以降
            - Intel / Apple Silicon 両対応（Universal Binary）
          files: dist/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
