<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>MacMerge</title>
  <style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #1e1e2e;
  color: #cdd6f4;
  height: 100vh;
  overflow: hidden;
}

button, input, select { cursor: pointer; }

#app { height: 100vh; display: flex; flex-direction: column; }
.hidden { display: none !important; }

/* ===== Drop Screen ===== */
#drop-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; gap: 28px; padding: 40px;
}

.app-title { font-size: 36px; font-weight: 700; color: #cba6f7; letter-spacing: 2px; }
.app-subtitle { font-size: 14px; color: #6c7086; }

.drop-row { display: flex; align-items: center; gap: 24px; width: 100%; max-width: 860px; }

.drop-zone {
  flex: 1; border: 2px dashed #45475a; border-radius: 16px; padding: 40px 24px;
  text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
  min-height: 200px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}

.drop-zone.drag-over { border-color: #cba6f7; background: rgba(203,166,247,0.07); }
.drop-zone.has-file  { border-color: #a6e3a1; background: rgba(166,227,161,0.07); }

.drop-icon  { font-size: 36px; }
.drop-label { font-size: 16px; font-weight: 600; color: #cdd6f4; }
.drop-hint  { font-size: 12px; color: #6c7086; }
.drop-path  { font-size: 11px; color: #a6e3a1; margin-top: 6px; word-break: break-all; }

.drop-arrow { font-size: 28px; color: #45475a; flex-shrink: 0; }

#compare-btn {
  padding: 12px 48px; font-size: 15px; font-weight: 600;
  border: none; border-radius: 10px;
  background: #cba6f7; color: #1e1e2e; cursor: pointer; transition: opacity 0.2s;
}
#compare-btn:disabled { opacity: 0.35; cursor: not-allowed; }
#compare-btn:not(:disabled):hover { opacity: 0.85; }

.error-msg { color: #f38ba8; font-size: 13px; min-height: 18px; }

/* ===== Result Screen ===== */
#result-screen { display: flex; flex-direction: column; height: 100%; }

.toolbar {
  display: flex; align-items: center; gap: 16px; padding: 10px 16px;
  background: #181825; border-bottom: 1px solid #313244; flex-shrink: 0;
}

#back-btn {
  padding: 6px 14px; font-size: 13px;
  border: 1px solid #45475a; border-radius: 6px;
  background: transparent; color: #cdd6f4; cursor: pointer;
}
#back-btn:hover { background: #313244; }

.result-title   { font-size: 13px; color: #6c7086; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.result-summary { font-size: 12px; color: #6c7086; flex-shrink: 0; }

/* ===== Directory View ===== */
#dir-view { display: flex; flex: 1; overflow: hidden; }

#dir-tree {
  width: 340px; min-width: 200px; flex-shrink: 0; overflow-y: auto;
  background: #181825; border-right: 1px solid #313244; padding: 8px 0;
}

.tree-item {
  display: flex; align-items: center; gap: 8px; padding: 5px 16px;
  font-size: 13px; cursor: pointer; transition: background 0.1s; user-select: none;
}
.tree-item:hover   { background: #313244; }
.tree-item.selected { background: #45475a; }

.tree-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.status-same     .tree-status { background: #45475a; }
.status-modified .tree-status { background: #fab387; }
.status-added    .tree-status { background: #a6e3a1; }
.status-removed  .tree-status { background: #f38ba8; }

.tree-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

.status-same     .tree-name { color: #6c7086; }
.status-modified .tree-name { color: #fab387; }
.status-added    .tree-name { color: #a6e3a1; }
.status-removed  .tree-name { color: #f38ba8; }

.tree-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; flex-shrink: 0; }
.status-same     .tree-badge { background: #313244; color: #6c7086; }
.status-modified .tree-badge { background: rgba(250,179,135,0.15); color: #fab387; }
.status-added    .tree-badge { background: rgba(166,227,161,0.15); color: #a6e3a1; }
.status-removed  .tree-badge { background: rgba(243,139,168,0.15); color: #f38ba8; }

.tree-legend {
  padding: 8px 16px 4px; font-size: 11px; color: #45475a;
  border-bottom: 1px solid #313244; margin-bottom: 4px; display: flex; gap: 12px;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot  { width: 7px; height: 7px; border-radius: 50%; }

/* Dir diff panel */
#dir-diff-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.diff-panel-header {
  display: flex; align-items: center; padding: 8px 16px;
  background: #181825; border-bottom: 1px solid #313244; font-size: 13px;
  color: #cdd6f4; flex-shrink: 0;
}
.diff-panel-header span { flex: 1; }

#close-diff-panel {
  border: none; background: transparent; color: #6c7086;
  font-size: 16px; cursor: pointer; padding: 0 4px;
}
#close-diff-panel:hover { color: #cdd6f4; }

#diff-panel-content {
  flex: 1; overflow: hidden; padding: 16px;
  display: flex; flex-direction: column; min-height: 0;
}

/* ===== File View ===== */
#file-view {
  flex: 1; overflow: hidden; padding: 16px;
  display: flex; flex-direction: column; min-height: 0;
}

#file-diff-content { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

/* ===== Custom diff table ===== */
.custom-diff {
  font-family: 'SF Mono', 'Menlo', 'Monaco', monospace; font-size: 12px;
  border: 1px solid #313244; border-radius: 8px; overflow: hidden;
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

.diff-file-header {
  display: flex; align-items: center; gap: 8px; padding: 7px 12px;
  background: #181825; border-bottom: 1px solid #313244;
  font-size: 11px; color: #6c7086; flex-shrink: 0;
}
.diff-file-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.diff-file-sep   { flex-shrink: 0; color: #45475a; }

.diff-table-wrap {
  overflow-y: scroll; overflow-x: hidden; flex: 1; min-height: 0;
}
.diff-h-split { display: flex; }
.diff-left-wrap {
  flex: 1; overflow-x: auto; position: relative; min-width: 0;
  border-right: 1px solid #313244;
}
.diff-right-wrap { flex: 1; overflow-x: auto; position: relative; min-width: 0; }
.diff-table { min-width: 100%; border-collapse: collapse; }

.diff-ln {
  position: sticky; left: 0; z-index: 1;
  width: 44px; min-width: 44px; text-align: right; padding: 1px 8px;
  color: #45475a; background: #181825; border-right: 1px solid #313244;
  user-select: none; vertical-align: top; font-size: 11px;
}
.diff-code {
  padding: 1px 12px; white-space: pre; color: #cdd6f4; vertical-align: top;
}

.diff-ln-del   { background: rgba(243,139,168,0.18); color: #f38ba8; }
.diff-ln-ins   { background: rgba(166,227,161,0.18); color: #a6e3a1; }
.diff-code-del { background: rgba(243,139,168,0.18); }
.diff-code-ins { background: rgba(166,227,161,0.18); }
.diff-code-empty { background: #181825; }

mark.diff-del {
  background: rgba(243,139,168,0.50); color: #cdd6f4;
  border-radius: 2px; padding: 0 1px;
}
mark.diff-ins {
  background: rgba(166,227,161,0.50); color: #cdd6f4;
  border-radius: 2px; padding: 0 1px;
}

.diff-skip td {
  text-align: center; color: #45475a; background: #181825;
  padding: 3px; font-size: 11px;
  border-top: 1px solid #313244; border-bottom: 1px solid #313244;
}

.diff-no-change { text-align: center; color: #45475a; padding: 40px; font-size: 14px; }

/* ===== Line Detail Panel ===== */
#line-detail {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #13131f; border-top: 2px solid #cba6f7; z-index: 200;
}

.ldp-header {
  display: flex; align-items: center;
  padding: 4px 12px; border-bottom: 1px solid #313244; min-height: 26px;
}
.ldp-title { flex: 1; font-size: 11px; font-weight: 600; color: #cba6f7; }
.ldp-hint  { font-weight: 400; color: #45475a; margin-left: 6px; }

#close-ldp {
  border: none; background: transparent; color: #6c7086;
  font-size: 14px; cursor: pointer; padding: 0 4px; line-height: 1;
}
#close-ldp:hover { color: #cdd6f4; }

.ldp-row { display: flex; align-items: stretch; border-bottom: 1px solid #313244; }
.ldp-row:last-child { border-bottom: none; }
.ldp-label {
  width: 58px; flex-shrink: 0; display: flex; align-items: center;
  justify-content: flex-end; padding: 4px 10px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  border-right: 1px solid #313244; user-select: none;
}
.ldp-del-label { background: rgba(243,139,168,0.10); color: #f38ba8; }
.ldp-ins-label { background: rgba(166,227,161,0.10); color: #a6e3a1; }

.ldp-content {
  flex: 1; min-width: 0; padding: 4px 14px;
  font-family: 'SF Mono', 'Menlo', 'Monaco', monospace; font-size: 13px;
  white-space: pre; overflow-x: auto; overflow-y: hidden; color: #cdd6f4; line-height: 1.5;
}

tr[data-row] { cursor: pointer; }
tr[data-row]:hover td { filter: brightness(1.15); }

.empty-panel { display: flex; align-items: center; justify-content: center; height: 100%; color: #45475a; font-size: 14px; }
  </style>
</head>
<body>
<div id="app">
  <!-- DROP SCREEN -->
  <div id="drop-screen">
    <div class="app-title">MacMerge</div>
    <div class="app-subtitle">2つのファイルまたはフォルダをドロップして比較</div>
    <div class="drop-row">
      <div class="drop-zone" id="drop-left">
        <div class="drop-icon">⬛</div>
        <div class="drop-label">左 (Before)</div>
        <div class="drop-hint">ファイルまたはフォルダをドロップ</div>
        <div class="drop-path" id="path-left"></div>
      </div>
      <div class="drop-arrow">⟷</div>
      <div class="drop-zone" id="drop-right">
        <div class="drop-icon">⬛</div>
        <div class="drop-label">右 (After)</div>
        <div class="drop-hint">ファイルまたはフォルダをドロップ</div>
        <div class="drop-path" id="path-right"></div>
      </div>
    </div>
    <button id="compare-btn" disabled>比較する</button>
    <div id="drop-error" class="error-msg"></div>
  </div>

  <!-- LINE DETAIL PANEL -->
  <div id="line-detail" class="hidden">
    <div class="ldp-header">
      <span class="ldp-title">差分詳細　<span class="ldp-hint">ダブルクリックで表示</span></span>
      <button id="close-ldp">✕</button>
    </div>
    <div class="ldp-row">
      <span class="ldp-label ldp-del-label">Before</span>
      <div class="ldp-content" id="ldp-before"></div>
    </div>
    <div class="ldp-row">
      <span class="ldp-label ldp-ins-label">After</span>
      <div class="ldp-content" id="ldp-after"></div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="hidden">
    <div class="toolbar">
      <button id="back-btn">← 戻る</button>
      <span id="result-title" class="result-title"></span>
      <span id="result-summary" class="result-summary"></span>
    </div>
    <div id="dir-view" class="hidden">
      <div id="dir-tree"></div>
      <div id="dir-diff-panel" class="hidden">
        <div class="diff-panel-header">
          <span id="diff-panel-filename"></span>
          <button id="close-diff-panel">✕</button>
        </div>
        <div id="diff-panel-content"></div>
      </div>
    </div>
    <div id="file-view" class="hidden">
      <div id="file-diff-content"></div>
    </div>
  </div>
</div>

                                curRange.push(line);
                            }
                            const hunk = {
                                oldStart: oldRangeStart,
                                oldLines: (oldLine - oldRangeStart + contextSize),
                                newStart: newRangeStart,
                                newLines: (newLine - newRangeStart + contextSize),
                                lines: curRange
                            };
                            hunks.push(hunk);
                            oldRangeStart = 0;
                            newRangeStart = 0;
                            curRange = [];
                        }
                    }
                    oldLine += lines.length;
                    newLine += lines.length;
                }
            }
            // Step 2: eliminate the trailing `\n` from each line of each hunk, and, where needed, add
            //         "\ No newline at end of file".
            for (const hunk of hunks) {
                for (let i = 0; i < hunk.lines.length; i++) {
                    if (hunk.lines[i].endsWith('\n')) {
                        hunk.lines[i] = hunk.lines[i].slice(0, -1);
                    }
                    else {
                        hunk.lines.splice(i + 1, 0, '\\ No newline at end of file');
                        i++; // Skip the line we just added, then continue iterating
                    }
                }
            }
            return {
                oldFileName: oldFileName, newFileName: newFileName,
                oldHeader: oldHeader, newHeader: newHeader,
                hunks: hunks
            };
        }
    }
    /**
     * creates a unified diff patch.
     * @param patch either a single structured patch object (as returned by `structuredPatch`) or an array of them (as returned by `parsePatch`)
     */
    function formatPatch(patch, headerOptions) {
        if (!headerOptions) {
            headerOptions = INCLUDE_HEADERS;
        }
        if (Array.isArray(patch)) {
            if (patch.length > 1 && !headerOptions.includeFileHeaders) {
                throw new Error('Cannot omit file headers on a multi-file patch. '
                    + '(The result would be unparseable; how would a tool trying to apply '
                    + 'the patch know which changes are to which file?)');
            }
            return patch.map(p => formatPatch(p, headerOptions)).join('\n');
        }
        const ret = [];
        if (headerOptions.includeIndex && patch.oldFileName == patch.newFileName) {
            ret.push('Index: ' + patch.oldFileName);
        }
        if (headerOptions.includeUnderline) {
            ret.push('===================================================================');
        }
        if (headerOptions.includeFileHeaders) {
            ret.push('--- ' + patch.oldFileName + (typeof patch.oldHeader === 'undefined' ? '' : '\t' + patch.oldHeader));
            ret.push('+++ ' + patch.newFileName + (typeof patch.newHeader === 'undefined' ? '' : '\t' + patch.newHeader));
        }
        for (let i = 0; i < patch.hunks.length; i++) {
            const hunk = patch.hunks[i];
            // Unified Diff Format quirk: If the chunk size is 0,
            // the first number is one lower than one would expect.
            // https://www.artima.com/weblogs/viewpost.jsp?thread=164293
            if (hunk.oldLines === 0) {
                hunk.oldStart -= 1;
            }
            if (hunk.newLines === 0) {
                hunk.newStart -= 1;
            }
            ret.push('@@ -' + hunk.oldStart + ',' + hunk.oldLines
                + ' +' + hunk.newStart + ',' + hunk.newLines
                + ' @@');
            for (const line of hunk.lines) {
                ret.push(line);
            }
        }
        return ret.join('\n') + '\n';
    }
    function createTwoFilesPatch(oldFileName, newFileName, oldStr, newStr, oldHeader, newHeader, options) {
        if (typeof options === 'function') {
            options = { callback: options };
        }
        if (!(options === null || options === void 0 ? void 0 : options.callback)) {
            const patchObj = structuredPatch(oldFileName, newFileName, oldStr, newStr, oldHeader, newHeader, options);
            if (!patchObj) {
                return;
            }
            return formatPatch(patchObj, options === null || options === void 0 ? void 0 : options.headerOptions);
        }
        else {
            const { callback } = options;
            structuredPatch(oldFileName, newFileName, oldStr, newStr, oldHeader, newHeader, Object.assign(Object.assign({}, options), { callback: patchObj => {
                    if (!patchObj) {
                        callback(undefined);
                    }
                    else {
                        callback(formatPatch(patchObj, options.headerOptions));
                    }
                } }));
        }
    }
    function createPatch(fileName, oldStr, newStr, oldHeader, newHeader, options) {
        return createTwoFilesPatch(fileName, fileName, oldStr, newStr, oldHeader, newHeader, options);
    }
    /**
     * Split `text` into an array of lines, including the trailing newline character (where present)
     */
    function splitLines(text) {
        const hasTrailingNl = text.endsWith('\n');
        const result = text.split('\n').map(line => line + '\n');
        if (hasTrailingNl) {
            result.pop();
        }
        else {
            result.push(result.pop().slice(0, -1));
        }
        return result;
    }

    /**
     * converts a list of change objects to the format returned by Google's [diff-match-patch](https://github.com/google/diff-match-patch) library
     */
    function convertChangesToDMP(changes) {
        const ret = [];
        let change, operation;
        for (let i = 0; i < changes.length; i++) {
            change = changes[i];
            if (change.added) {
                operation = 1;
            }
            else if (change.removed) {
                operation = -1;
            }
            else {
                operation = 0;
            }
            ret.push([operation, change.value]);
        }
        return ret;
    }

    /**
     * converts a list of change objects to a serialized XML format
     */
    function convertChangesToXML(changes) {
        const ret = [];
        for (let i = 0; i < changes.length; i++) {
            const change = changes[i];
            if (change.added) {
                ret.push('<ins>');
            }
            else if (change.removed) {
                ret.push('<del>');
            }
            ret.push(escapeHTML(change.value));
            if (change.added) {
                ret.push('</ins>');
            }
            else if (change.removed) {
                ret.push('</del>');
            }
        }
        return ret.join('');
    }
    function escapeHTML(s) {
        let n = s;
        n = n.replace(/&/g, '&amp;');
        n = n.replace(/</g, '&lt;');
        n = n.replace(/>/g, '&gt;');
        n = n.replace(/"/g, '&quot;');
        return n;
    }

    exports.Diff = Diff;
    exports.FILE_HEADERS_ONLY = FILE_HEADERS_ONLY;
    exports.INCLUDE_HEADERS = INCLUDE_HEADERS;
    exports.OMIT_HEADERS = OMIT_HEADERS;
    exports.applyPatch = applyPatch;
    exports.applyPatches = applyPatches;
    exports.arrayDiff = arrayDiff;
    exports.canonicalize = canonicalize;
    exports.characterDiff = characterDiff;
    exports.convertChangesToDMP = convertChangesToDMP;
    exports.convertChangesToXML = convertChangesToXML;
    exports.createPatch = createPatch;
    exports.createTwoFilesPatch = createTwoFilesPatch;
    exports.cssDiff = cssDiff;
    exports.diffArrays = diffArrays;
    exports.diffChars = diffChars;
    exports.diffCss = diffCss;
    exports.diffJson = diffJson;
    exports.diffLines = diffLines;
    exports.diffSentences = diffSentences;
    exports.diffTrimmedLines = diffTrimmedLines;
    exports.diffWords = diffWords;
    exports.diffWordsWithSpace = diffWordsWithSpace;
    exports.formatPatch = formatPatch;
    exports.jsonDiff = jsonDiff;
    exports.lineDiff = lineDiff;
    exports.parsePatch = parsePatch;
    exports.reversePatch = reversePatch;
    exports.sentenceDiff = sentenceDiff;
    exports.structuredPatch = structuredPatch;
    exports.wordDiff = wordDiff;
    exports.wordsWithSpaceDiff = wordsWithSpaceDiff;

}));

</script>
<script>
// ===== App (browser) =====

// ---- Virtual Scroller ----
const ROW_HEIGHT = 22;
const SCROLL_BUFFER = 30;

class VirtualScroller {
  constructor(container, rows) {
    this.rows = rows;
    this.container = container;

    // hSplit: flex row – its min-height drives the container's scroll height
    this.hSplit = document.createElement('div');
    this.hSplit.className = 'diff-h-split';
    this.hSplit.style.minHeight = `${rows.length * ROW_HEIGHT}px`;

    // Left / right halves – each scrolls independently on the X axis
    this.leftWrap  = document.createElement('div');
    this.rightWrap = document.createElement('div');
    this.leftWrap.className  = 'diff-left-wrap';
    this.rightWrap.className = 'diff-right-wrap';

    // One table per side, absolutely positioned within its half
    this.tableL = document.createElement('table');
    this.tableR = document.createElement('table');
    this.tableL.className = this.tableR.className = 'diff-table';
    this.tableL.style.cssText = this.tableR.style.cssText =
      'position:absolute;top:0;left:0;min-width:100%;';
    this.tbodyL = document.createElement('tbody');
    this.tbodyR = document.createElement('tbody');
    this.tableL.appendChild(this.tbodyL);
    this.tableR.appendChild(this.tbodyR);

    this.leftWrap.appendChild(this.tableL);
    this.rightWrap.appendChild(this.tableR);
    this.hSplit.appendChild(this.leftWrap);
    this.hSplit.appendChild(this.rightWrap);
    container.appendChild(this.hSplit);

    this._start = -1;
    this._end   = -1;
    container.addEventListener('scroll', () => this._update(), { passive: true });
    this._update();
  }

  _update() {
    const scrollTop = this.container.scrollTop;
    const viewH    = this.container.clientHeight;
    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - SCROLL_BUFFER);
    const end   = Math.min(this.rows.length, Math.ceil((scrollTop + viewH) / ROW_HEIGHT) + SCROLL_BUFFER);

    if (start === this._start && end === this._end) return;
    this._start = start;
    this._end   = end;

    const topPx = `${start * ROW_HEIGHT}px`;
    this.tableL.style.top = this.tableR.style.top = topPx;

    const fragL = document.createDocumentFragment();
    const fragR = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const [trL, trR] = this._makeRow(this.rows[i]);
      fragL.appendChild(trL);
      fragR.appendChild(trR);
    }
    this.tbodyL.replaceChildren(fragL);
    this.tbodyR.replaceChildren(fragR);
  }

  _makeRow(row) {
    const trL = document.createElement('tr');
    const trR = document.createElement('tr');
    trL.style.height = trR.style.height = ROW_HEIGHT + 'px';

    if (row.type === 'same') {
      trL.className = trR.className = 'diff-row-same';
      trL.innerHTML = `<td class="diff-ln">${row.leftNum}</td><td class="diff-code">${row.leftHtml}</td>`;
      trR.innerHTML = `<td class="diff-ln">${row.rightNum}</td><td class="diff-code">${row.rightHtml}</td>`;
    } else if (row.type === 'change') {
      trL.className = trR.className = 'diff-row-change';
      trL.dataset.row = trR.dataset.row = row.rowIdx;
      trL.title = trR.title = 'ダブルクリックで詳細表示';
      trL.innerHTML = `<td class="diff-ln diff-ln-del">${row.leftNum}</td><td class="diff-code diff-code-del">${row.leftHtml}</td>`;
      trR.innerHTML = `<td class="diff-ln diff-ln-ins">${row.rightNum}</td><td class="diff-code diff-code-ins">${row.rightHtml}</td>`;
    } else if (row.type === 'removed') {
      trL.className = trR.className = 'diff-row-change';
      trL.innerHTML = `<td class="diff-ln diff-ln-del">${row.leftNum}</td><td class="diff-code diff-code-del">${row.leftHtml}</td>`;
      trR.innerHTML = `<td class="diff-ln"></td><td class="diff-code diff-code-empty"></td>`;
    } else { // added
      trL.className = trR.className = 'diff-row-change';
      trL.innerHTML = `<td class="diff-ln"></td><td class="diff-code diff-code-empty"></td>`;
      trR.innerHTML = `<td class="diff-ln diff-ln-ins">${row.rightNum}</td><td class="diff-code diff-code-ins">${row.rightHtml}</td>`;
    }
    return [trL, trR];
  }
}

// ---- State ----
// Each slot: { name: string, type: 'file'|'dir', content?: string, fileMap?: Map<relPath, string> }
const state = { left: null, right: null };

// ---- DOM refs ----
const dropScreen      = document.getElementById('drop-screen');
const resultScreen    = document.getElementById('result-screen');
const dropLeft        = document.getElementById('drop-left');
const dropRight       = document.getElementById('drop-right');
const pathLeft        = document.getElementById('path-left');
const pathRight       = document.getElementById('path-right');
const compareBtn      = document.getElementById('compare-btn');
const dropError       = document.getElementById('drop-error');
const backBtn         = document.getElementById('back-btn');
const resultTitle     = document.getElementById('result-title');
const resultSummary   = document.getElementById('result-summary');
const dirView         = document.getElementById('dir-view');
const dirTree         = document.getElementById('dir-tree');
const dirDiffPanel    = document.getElementById('dir-diff-panel');
const diffPanelFilename = document.getElementById('diff-panel-filename');
const diffPanelContent  = document.getElementById('diff-panel-content');
const closeDiffPanel  = document.getElementById('close-diff-panel');
const fileView        = document.getElementById('file-view');
const fileDiffContent = document.getElementById('file-diff-content');
const lineDetail      = document.getElementById('line-detail');
const ldpBefore       = document.getElementById('ldp-before');
const ldpAfter        = document.getElementById('ldp-after');
const closeLdp        = document.getElementById('close-ldp');

// ---- Browser file/dir reading ----

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => resolve(e.target.result);
    reader.onerror = () => reject(new Error('ファイル読み込みエラー: ' + file.name));
    reader.readAsText(file);
  });
}

function readAllDirEntries(reader) {
  return new Promise((resolve, reject) => {
    const all = [];
    function batch() {
      reader.readEntries(entries => {
        if (entries.length === 0) resolve(all);
        else { all.push(...entries); batch(); }
      }, reject);
    }
    batch();
  });
}

function readFileEntry(entry) {
  return new Promise((resolve, reject) => entry.file(resolve, reject));
}

// Returns Map<relPath, string> for a directory entry
async function readDirTree(dirEntry) {
  const map = new Map();

  async function walk(entry, rel) {
    if (entry.isFile) {
      const file    = await readFileEntry(entry);
      let content;
      try {
        content = await readFileAsText(file);
      } catch {
        content = '';  // treat unreadable (binary) files as empty
      }
      map.set(rel, content);
    } else if (entry.isDirectory) {
      const children = await readAllDirEntries(entry.createReader());
      for (const child of children) {
        const childRel = rel ? rel + '/' + child.name : child.name;
        await walk(child, childRel);
      }
    }
  }

  await walk(dirEntry, '');
  return map;
}

// ---- Drop handling ----

// webkitGetAsEntry() / getAsFile() must be called synchronously during the drop event.
// Extract them immediately and pass { entry, file } objects to async processing.
function extractTransferItems(e) {
  const result = [];
  for (const item of e.dataTransfer.items) {
    if (item.kind !== 'file') continue;
    result.push({
      entry: item.webkitGetAsEntry ? item.webkitGetAsEntry() : null,
      file:  item.getAsFile(),
    });
  }
  return result;
}

async function processItems(transferItems, defaultSide) {
  if (!transferItems || transferItems.length === 0) return;
  dropError.textContent = '';

  if (transferItems.length >= 2) {
    const t0 = transferItems[0], t1 = transferItems[1];
    const isDir0 = t0.entry && t0.entry.isDirectory;
    const isDir1 = t1.entry && t1.entry.isDirectory;
    if (isDir0 !== isDir1) { showError('ファイルとフォルダを混在させることはできません'); return; }

    compareBtn.disabled = true;
    compareBtn.textContent = '読み込み中…';
    try {
      const [slot0, slot1] = await Promise.all([loadItem(t0), loadItem(t1)]);
      setSlot('left',  slot0);
      setSlot('right', slot1);
      await doCompare();
    } catch (err) {
      showError('エラー: ' + err.message);
    } finally {
      compareBtn.textContent = '比較する';
      updateCompareBtn();
    }
    return;
  }

  compareBtn.disabled = true;
  compareBtn.textContent = '読み込み中…';
  try {
    const slot = await loadItem(transferItems[0]);
    setSlot(defaultSide, slot);
  } catch (err) {
    showError('エラー: ' + err.message);
  } finally {
    compareBtn.textContent = '比較する';
    updateCompareBtn();
  }
}

async function loadItem({ entry, file }) {
  if (entry && entry.isDirectory) {
    const fileMap = await readDirTree(entry);
    return { name: entry.name, type: 'dir', fileMap };
  }
  // File (or no entry support)
  const f = file || (entry ? await readFileEntry(entry) : null);
  if (!f) throw new Error('ファイルを取得できませんでした');
  const content = await readFileAsText(f);
  return { name: f.name, type: 'file', content };
}

function setupDropZone(zone, side) {
  zone.addEventListener('dragover', (e) => {
    e.preventDefault(); e.stopPropagation();
    if (e.dataTransfer.items.length >= 2) {
      dropLeft.classList.add('drag-over'); dropRight.classList.add('drag-over');
    } else { zone.classList.add('drag-over'); }
  });
  zone.addEventListener('dragleave', (e) => {
    e.preventDefault(); e.stopPropagation();
    dropLeft.classList.remove('drag-over'); dropRight.classList.remove('drag-over');
  });
  zone.addEventListener('drop', (e) => {
    e.preventDefault(); e.stopPropagation();
    dropLeft.classList.remove('drag-over'); dropRight.classList.remove('drag-over');
    processItems(extractTransferItems(e), side);
  });
}

dropScreen.addEventListener('dragover', (e) => {
  e.preventDefault();
  if (e.dataTransfer.items.length >= 2) {
    dropLeft.classList.add('drag-over'); dropRight.classList.add('drag-over');
  }
});
dropScreen.addEventListener('dragleave', () => {
  dropLeft.classList.remove('drag-over'); dropRight.classList.remove('drag-over');
});
dropScreen.addEventListener('drop', (e) => {
  e.preventDefault();
  dropLeft.classList.remove('drag-over'); dropRight.classList.remove('drag-over');
  processItems(extractTransferItems(e), state.left ? 'right' : 'left');
});

function setSlot(side, slot) {
  state[side] = slot;
  const pathEl = side === 'left' ? pathLeft : pathRight;
  const zone   = side === 'left' ? dropLeft  : dropRight;
  const icon   = slot.type === 'dir' ? '📁' : '📄';
  pathEl.textContent = `${icon} ${slot.name}`;
  zone.classList.add('has-file');
  dropError.textContent = '';
  updateCompareBtn();
}

function updateCompareBtn() {
  if (!state.left || !state.right) { compareBtn.disabled = true; return; }
  if (state.left.type !== state.right.type) {
    showError('ファイルとフォルダを混在させることはできません');
    compareBtn.disabled = true; return;
  }
  dropError.textContent = '';
  compareBtn.disabled = false;
}

function showError(msg) { dropError.textContent = msg; }

setupDropZone(dropLeft,  'left');
setupDropZone(dropRight, 'right');

// ---- Compare ----

async function doCompare() {
  if (!state.left || !state.right) return;
  dropError.textContent = '';
  compareBtn.disabled   = true;
  compareBtn.textContent = '比較中…';
  try {
    if (state.left.type === 'file') {
      runFileCompare();
      showResultScreen();
    } else {
      runDirCompare();
      showResultScreen();
    }
  } catch (err) {
    showError('エラー: ' + err.message);
    compareBtn.disabled = false;
  } finally {
    compareBtn.textContent = '比較する';
  }
}

compareBtn.addEventListener('click', doCompare);

backBtn.addEventListener('click', () => {
  dropScreen.classList.remove('hidden');
  resultScreen.classList.add('hidden');
  dirView.classList.add('hidden');
  fileView.classList.add('hidden');
  dirDiffPanel.classList.add('hidden');
  lineDetail.classList.add('hidden');
  compareBtn.disabled = false;
});

// ---- Line detail panel ----

const rowDataStore = [];

closeLdp.addEventListener('click', () => lineDetail.classList.add('hidden'));

let isSyncing = false;
function syncScroll(source, target) {
  source.addEventListener('scroll', () => {
    if (isSyncing) return;
    isSyncing = true;
    target.scrollLeft = source.scrollLeft;
    isSyncing = false;
  });
}
syncScroll(ldpBefore, ldpAfter);
syncScroll(ldpAfter,  ldpBefore);

function showLineDetail(leftText, rightText) {
  const charDiff = Diff.diffChars(leftText, rightText);
  let beforeHtml = '', afterHtml = '';
  for (const c of charDiff) {
    if (c.removed)     beforeHtml += `<mark class="diff-del">${escHtml(c.value)}</mark>`;
    else if (c.added)  afterHtml  += `<mark class="diff-ins">${escHtml(c.value)}</mark>`;
    else { const esc = escHtml(c.value); beforeHtml += esc; afterHtml += esc; }
  }
  ldpBefore.innerHTML = beforeHtml;
  ldpAfter.innerHTML  = afterHtml;
  lineDetail.classList.remove('hidden');
}

function attachDblClickHandler(container) {
  container.addEventListener('dblclick', (e) => {
    const tr = e.target.closest('tr[data-row]');
    if (!tr) return;
    const idx  = parseInt(tr.dataset.row, 10);
    const data = rowDataStore[idx];
    if (data) showLineDetail(data.leftText, data.rightText);
  });
}

// ---- Diff rendering ----

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function splitLines(str) {
  const lines = str.split('\n');
  if (lines.length > 0 && lines[lines.length - 1] === '') lines.pop();
  return lines;
}

function buildRows(leftContent, rightContent) {
  const lineDiff = Diff.diffLines(leftContent, rightContent);
  const rows = [];
  let leftNum = 1, rightNum = 1;
  let i = 0;

  while (i < lineDiff.length) {
    const part = lineDiff[i];

    if (!part.added && !part.removed) {
      for (const line of splitLines(part.value)) {
        rows.push({ type: 'same', leftNum: leftNum++, rightNum: rightNum++,
                    leftHtml: escHtml(line), rightHtml: escHtml(line) });
      }
      i++; continue;
    }

    const leftLines  = part.removed ? splitLines(part.value) : [];
    let   rightLines = [];

    if (part.removed && i + 1 < lineDiff.length && lineDiff[i + 1].added) {
      rightLines = splitLines(lineDiff[i + 1].value); i += 2;
    } else if (part.added) {
      rightLines = splitLines(part.value); i++;
    } else { i++; }

    const pairCount = Math.min(leftLines.length, rightLines.length);

    // Paired lines → store text for double-click detail; plain HTML in main table
    for (let j = 0; j < pairCount; j++) {
      const rowIdx = rowDataStore.length;
      rowDataStore.push({ leftText: leftLines[j], rightText: rightLines[j] });
      rows.push({ type: 'change', leftNum: leftNum++, rightNum: rightNum++,
                  leftHtml: escHtml(leftLines[j]), rightHtml: escHtml(rightLines[j]), rowIdx });
    }

    for (let j = pairCount; j < leftLines.length; j++)
      rows.push({ type: 'removed', leftNum: leftNum++, rightNum: null, leftHtml: escHtml(leftLines[j]), rightHtml: '' });
    for (let j = pairCount; j < rightLines.length; j++)
      rows.push({ type: 'added', leftNum: null, rightNum: rightNum++, leftHtml: '', rightHtml: escHtml(rightLines[j]) });
  }

  return rows;
}

function mountSideBySideDiff(container, leftLabel, rightLabel, leftContent, rightContent) {
  const rows = buildRows(leftContent, rightContent);
  const changedCount = rows.filter(r => r.type !== 'same').length;

  const wrapper = document.createElement('div');
  wrapper.className = 'custom-diff';

  const header = document.createElement('div');
  header.className = 'diff-file-header';
  header.innerHTML = `
    <span class="diff-file-label">${escHtml(leftLabel)}</span>
    <span class="diff-file-sep">↔</span>
    <span class="diff-file-label">${escHtml(rightLabel)}</span>
  `;
  wrapper.appendChild(header);

  if (changedCount === 0) {
    const noChange = document.createElement('div');
    noChange.className = 'diff-no-change';
    noChange.textContent = '差分なし（ファイルは同一です）';
    wrapper.appendChild(noChange);
  } else {
    const tableWrap = document.createElement('div');
    tableWrap.className = 'diff-table-wrap';
    wrapper.appendChild(tableWrap);
    const vs = new VirtualScroller(tableWrap, rows);
    attachDblClickHandler(tableWrap);
    // Sync horizontal scroll between left and right halves
    let hSync = false;
    vs.leftWrap.addEventListener('scroll', () => {
      if (hSync) return; hSync = true;
      vs.rightWrap.scrollLeft = vs.leftWrap.scrollLeft;
      hSync = false;
    }, { passive: true });
    vs.rightWrap.addEventListener('scroll', () => {
      if (hSync) return; hSync = true;
      vs.leftWrap.scrollLeft = vs.rightWrap.scrollLeft;
      hSync = false;
    }, { passive: true });
  }

  container.innerHTML = '';
  container.appendChild(wrapper);
  return rows;
}

// ---- File comparison ----

function runFileCompare() {
  rowDataStore.length = 0;
  const rows = mountSideBySideDiff(
    fileDiffContent,
    state.left.name, state.right.name,
    state.left.content, state.right.content
  );

  resultTitle.textContent = `${state.left.name}  ↔  ${state.right.name}`;
  const added   = rows.filter(r => r.type === 'added'   || r.type === 'change').length;
  const removed = rows.filter(r => r.type === 'removed' || r.type === 'change').length;
  resultSummary.textContent = `+${added} / -${removed}`;

  fileView.classList.remove('hidden');
  dirView.classList.add('hidden');
}

// ---- Directory comparison ----

let dirEntriesData = [];  // { relPath, leftContent, rightContent, status }

function runDirCompare() {
  const leftMap  = state.left.fileMap;
  const rightMap = state.right.fileMap;

  const allKeys = [...new Set([...leftMap.keys(), ...rightMap.keys()])].sort();
  dirEntriesData = [];
  const counts = { same: 0, modified: 0, added: 0, removed: 0 };

  for (const relPath of allKeys) {
    const leftContent  = leftMap.has(relPath)  ? leftMap.get(relPath)  : null;
    const rightContent = rightMap.has(relPath) ? rightMap.get(relPath) : null;

    let status;
    if (leftContent === null)       status = 'added';
    else if (rightContent === null) status = 'removed';
    else                            status = leftContent === rightContent ? 'same' : 'modified';

    dirEntriesData.push({ relPath, leftContent, rightContent, status });
    counts[status]++;
  }

  resultTitle.textContent = `${state.left.name}  ↔  ${state.right.name}`;
  resultSummary.textContent =
    `変更: ${counts.modified}  追加: ${counts.added}  削除: ${counts.removed}  同一: ${counts.same}`;

  renderDirTree();
  fileView.classList.add('hidden');
  dirView.classList.remove('hidden');
  dirDiffPanel.classList.add('hidden');
}

function renderDirTree() {
  dirTree.innerHTML = `
    <div class="tree-legend">
      <span class="legend-item"><span class="legend-dot" style="background:#fab387"></span>変更</span>
      <span class="legend-item"><span class="legend-dot" style="background:#a6e3a1"></span>追加</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f38ba8"></span>削除</span>
      <span class="legend-item"><span class="legend-dot" style="background:#45475a"></span>同一</span>
    </div>
  `;
  for (const entry of dirEntriesData) {
    const label = { same: '同一', modified: '変更', added: '追加', removed: '削除' };
    const item = document.createElement('div');
    item.className = `tree-item status-${entry.status}`;
    item.innerHTML = `
      <span class="tree-status"></span>
      <span class="tree-name" title="${escHtml(entry.relPath)}">${escHtml(entry.relPath)}</span>
      <span class="tree-badge">${label[entry.status]}</span>
    `;
    if (entry.status !== 'same') {
      item.addEventListener('click', () => openDirFileDiff(entry, item));
    }
    dirTree.appendChild(item);
  }
}

function openDirFileDiff(entry, itemEl) {
  document.querySelectorAll('.tree-item.selected').forEach(el => el.classList.remove('selected'));
  itemEl.classList.add('selected');

  diffPanelFilename.textContent = entry.relPath;
  dirDiffPanel.classList.remove('hidden');

  const leftContent  = entry.leftContent  ?? '';
  const rightContent = entry.rightContent ?? '';
  const leftLabel    = entry.leftContent  !== null ? `${state.left.name}/${entry.relPath}`  : '(存在しない)';
  const rightLabel   = entry.rightContent !== null ? `${state.right.name}/${entry.relPath}` : '(存在しない)';

  rowDataStore.length = 0;
  mountSideBySideDiff(diffPanelContent, leftLabel, rightLabel, leftContent, rightContent);
}

closeDiffPanel.addEventListener('click', () => {
  dirDiffPanel.classList.add('hidden');
  document.querySelectorAll('.tree-item.selected').forEach(el => el.classList.remove('selected'));
});

function showResultScreen() {
  dropScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');
}
</script>
